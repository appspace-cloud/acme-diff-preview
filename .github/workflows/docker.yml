name: Docker

# Builds and pushes the Docker image to JFrog Artifactory on version tags.
# GKE clusters pull the image via the GAR remote proxy:
#   us-central1-docker.pkg.dev/appspace-devops/artifact/acme-diff-preview:<tag>
on:
  push:
    tags:
      - 'v*'

env:
  JFROG_REGISTRY: docker-dev.repo.appspace.com
  IMAGE_NAME: acme-diff-preview

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5.0.0

      - name: Extract version from tag
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Log in to JFrog
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.JFROG_REGISTRY }}
          username: ${{ secrets.JFROG_USER }}
          password: ${{ secrets.JFROG_PASSWORD }}

      - name: Build and push to JFrog
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          tags: ${{ env.JFROG_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          build-args: |
            ARGOCD_VERSION=v3.4.3
