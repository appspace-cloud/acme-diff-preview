apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "acme-diff-preview.fullname" . }}-hard-refresh
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acme-diff-preview.labels" . | nindent 4 }}
    component: {{ include "acme-diff-preview.fullname" . }}-hard-refresh
spec:
  schedule: {{ .Values.hardRefresh.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: {{ include "acme-diff-preview.fullname" . }}
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
          containers:
            - name: hard-refresh
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              # Uses ARGOCD_PASS from ESO secret — dedicated diff-preview local account.
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -euo pipefail
                  ARGOCD_SERVER="{{ .Values.argocd.server }}"
                  argocd login "$ARGOCD_SERVER" \
                    --username {{ .Values.argocd.username | quote }} \
                    --password "$ARGOCD_PASS" \
                    --grpc-web --insecure
                  python3 /app/dev_hard_refresh.py
              env:
                - name: ARGOCD_USER
                  value: {{ .Values.argocd.username | quote }}
                - name: HOME
                  value: /tmp
              envFrom:
                - secretRef:
                    name: {{ include "acme-diff-preview.fullname" . }}-creds
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              resources:
                {{- toYaml .Values.hardRefresh.resources | nindent 16 }}
          volumes:
            - name: tmp
              emptyDir: {}
