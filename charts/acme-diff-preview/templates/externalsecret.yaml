apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "acme-diff-preview.fullname" . }}-creds
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acme-diff-preview.labels" . | nindent 4 }}
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: {{ .Values.secrets.externalSecretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ include "acme-diff-preview.fullname" . }}-creds
    creationPolicy: Owner
    # deletionPolicy: Retain keeps the K8s Secret alive if this ExternalSecret
    # is deleted (e.g. during a Helm migration). ESO recreates it on next install.
    deletionPolicy: Retain
  data:
    - secretKey: BB_USER
      remoteRef:
        key: {{ .Values.secrets.bbUserKey }}
    - secretKey: BB_TOKEN
      remoteRef:
        key: {{ .Values.secrets.bbTokenKey }}
    - secretKey: ARGOCD_PASS
      remoteRef:
        key: {{ .Values.secrets.argocdPassKey }}
