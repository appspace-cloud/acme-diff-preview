# Default values for acme-diff-preview.
# Override in acme-infrastructure helm_releases block.

# Use fullnameOverride to keep resource names stable regardless of release name.
# The ArgoCD Ingress extraPaths hardcodes "acme-diff-preview" as the Service name.
fullnameOverride: "acme-diff-preview"

image:
  repository: us-central1-docker.pkg.dev/appspace-devops/artifact/acme-diff-preview
  tag: "1.9.1"
  pullPolicy: IfNotPresent

# Log verbosity for the diff-preview service. Set to DEBUG to emit the full
# per-step diff detail (useful when diffs come back "unavailable").
logLevel: INFO

# Kubernetes version helm renders against (--kube-version). Both the main and PR
# renders use this same value, so charts that branch on .Capabilities.KubeVersion
# produce stable, cluster-representative output.
kubeVersion: "1.30.0"

# Diff engine tuning. The diff is a pure local `helm pull` + `helm template` +
# Python YAML diff (no ArgoCD agent round-trips), so the client can fan out wide;
# the only shared limit is the Bitbucket API used to fetch value files. Defaults
# are sized for a single PR that diffs hundreds of apps at once (a chart version
# bump rolled out to many clusters). Override only to tune for a specific load.
diff:
  # Hard cap on apps diffed per PR (covers 600+ apps/PR with headroom).
  maxAppsPerRun: 800
  # Parallel per-app helm-template diffs within one PR.
  workers: 16
  # Parallel PR processing workers.
  prWorkers: 3
  # Seconds per diff step (OCI cache-miss pulls can be slow on the first render).
  timeout: 120
  # Retry attempts per diff with exponential backoff + jitter on transient errors
  # (transient OCI pull failures, discovery-cache misses, timeouts).
  retries: 5
  # Parallel chart-cache warm-up pulls (one representative per distinct OCI chart
  # is pulled first so the fan-out reuses the local tarball).
  warmWorkers: 4
  # Only warm when a PR fans out to more apps than this.
  warmThreshold: 8

# ArgoCD server (hub cluster ingress)
argocd:
  server: argocd.appspace.com
  username: diff-preview

# Bitbucket Cloud repository to watch for open PRs
bitbucket:
  workspace: appspace-cloud
  repo: acme-config-dev

# Vertex AI for diff summaries
vertex:
  project: appspace-devops
  location: us-central1
  model: gemini-2.5-flash

# External Secrets Operator — ClusterSecretStore used to pull credentials
secrets:
  externalSecretStore: argocd-gcp-sm
  # GCP Secret Manager secret names (keys in the store)
  bbUserKey: acme-diff-preview-bb-user
  bbTokenKey: acme-diff-preview-bb-token
  argocdPassKey: argocd-diff-preview-admin-pass
  # GCP SM secret name for the JFrog webhook HMAC shared secret
  jfrogWebhookSecretKey: argocd-jfrog-webhook-shared-secret
  # OCI registry credentials for the helm-template diff (both helm-oci-dev and
  # helm-oci-release use the same pair). REQUIRED: without OCI_PASS every diff
  # returns "diff unavailable" because the chart pull fails. The pod logs an
  # ERROR at startup if OCI_PASS is empty.
  ociUserKey: acme-repo-username
  ociPassKey: acme-repo-password

# Webhook endpoint exposed via the ArgoCD Ingress extraPaths
webhook:
  path: /diff-preview/webhook

# NodePort Service — exposes port 8080 for the GKE Ingress backend
service:
  type: NodePort
  port: 8080

# ServiceAccount — WIF annotation maps to argocd@appspace-devops GSA
serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: argocd@appspace-devops.iam.gserviceaccount.com

# Deployment resource requests / limits.
# Sized for bursty fan-out: up to workers*prWorkers concurrent argocd CLI
# subprocesses (each ~50-100Mi) plus the warm-up pool during a 600+ app PR.
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    memory: 2Gi

# Hard-refresh CronJob — hard-refreshes all dev/QA apps every 2 hours
hardRefresh:
  schedule: "*/30 * * * *"  # JFrog webhook is primary trigger; cron is a fallback
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
