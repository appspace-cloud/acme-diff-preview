# Default values for acme-diff-preview.
# Override in acme-infrastructure helm_releases block.

# Use fullnameOverride to keep resource names stable regardless of release name.
# The ArgoCD Ingress extraPaths hardcodes "acme-diff-preview" as the Service name.
fullnameOverride: "acme-diff-preview"

image:
  repository: us-central1-docker.pkg.dev/appspace-devops/artifact/acme-diff-preview
  tag: "1.5.2"
  pullPolicy: IfNotPresent

# Log verbosity for the diff-preview service. Set to DEBUG to emit the full
# ArgoCD stderr and per-attempt diff classification (useful when diffs come
# back "unavailable" and you need to see why).
logLevel: INFO

# Diff engine tuning. Defaults are sized for a single PR that diffs hundreds of
# apps at once (a chart version bump rolled out to many clusters). Leave unset to
# use the in-code defaults; override here only to tune for a specific load.
diff:
  # Hard cap on apps diffed per PR (was 30; raised to cover 600+ apps/PR).
  maxAppsPerRun: 800
  # Parallel `argocd app diff` calls within one PR.
  workers: 16
  # Parallel PR processing workers (effective subprocess pool = prWorkers * workers).
  prWorkers: 3
  # Seconds per diff attempt (OCI cache-miss renders can exceed a minute).
  timeout: 120
  # Retry attempts per diff with exponential backoff + jitter on transient errors.
  # 5 attempts absorb the occasional late resource-proxy response on a single app.
  retries: 5
  # Parallel chart-cache warm-up diffs (one representative per distinct OCI chart
  # is diffed first to warm the repo-server cache before the big fan-out).
  warmWorkers: 4
  # Only warm when a PR fans out to more apps than this.
  warmThreshold: 8
  # Max concurrent diffs per agent / spoke cluster. All apps on one spoke share a
  # single argocd-agent and the principal resource-proxy connection to it. A single
  # `argocd app diff` of a large app (hundreds of resources) fans out into hundreds
  # of live-resource requests to that one agent; running several diffs at once on
  # the same spoke overruns the agent's response window and the principal drops the
  # late responses ("resource response not tracked"), which surfaces as redis_timeout.
  # Serializing per agent (1) and parallelizing ACROSS agents (workers) keeps every
  # request inside the proxy window while total throughput still scales with the
  # number of spokes. Validated on a 24-app mass bump: 1 -> 26/27 clean, 0 principal
  # panics; 3 -> 11 failures + channel-close panics.
  agentMaxConcurrency: 1

# ArgoCD server (hub cluster ingress)
argocd:
  server: argocd.appspace.com
  username: diff-preview

# Bitbucket Cloud repository to watch for open PRs
bitbucket:
  workspace: appspace-cloud
  repo: acme-config-dev

# Vertex AI for diff summaries
vertex:
  project: appspace-devops
  location: us-central1
  model: gemini-2.5-flash

# External Secrets Operator — ClusterSecretStore used to pull credentials
secrets:
  externalSecretStore: argocd-gcp-sm
  # GCP Secret Manager secret names (keys in the store)
  bbUserKey: acme-diff-preview-bb-user
  bbTokenKey: acme-diff-preview-bb-token
  argocdPassKey: argocd-diff-preview-admin-pass
  # GCP SM secret name for the JFrog webhook HMAC shared secret
  jfrogWebhookSecretKey: argocd-jfrog-webhook-shared-secret

# Webhook endpoint exposed via the ArgoCD Ingress extraPaths
webhook:
  path: /diff-preview/webhook

# NodePort Service — exposes port 8080 for the GKE Ingress backend
service:
  type: NodePort
  port: 8080

# ServiceAccount — WIF annotation maps to argocd@appspace-devops GSA
serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: argocd@appspace-devops.iam.gserviceaccount.com

# Deployment resource requests / limits.
# Sized for bursty fan-out: up to workers*prWorkers concurrent argocd CLI
# subprocesses (each ~50-100Mi) plus the warm-up pool during a 600+ app PR.
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    memory: 2Gi

# Hard-refresh CronJob — hard-refreshes all dev/QA apps every 2 hours
hardRefresh:
  schedule: "*/30 * * * *"  # JFrog webhook is primary trigger; cron is a fallback
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
